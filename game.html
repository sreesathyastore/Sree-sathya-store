<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catch & Shop – Sreesathya Store Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FDF6EC;
      --brown-dark: #3B2A1A;
      --brown-mid: #7A4F2D;
      --brown-light: #C49A6C;
      --orange: #E8722A;
      --orange-light: #F9A05A;
      --green: #4A7C59;
      --border: #E8D5B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      font-family: 'Lato', sans-serif;
      color: var(--brown-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── NAV (matches store) ── */
    nav {
      width: 100%;
      background: rgba(253,246,236,0.96);
      border-bottom: 1.5px solid var(--border);
      padding: 0 6%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--brown-dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-logo .logo-icon { font-size: 24px; }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--brown-mid);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--orange); }

    /* ── GAME WRAPPER ── */
    .game-wrapper {
      width: 100%;
      max-width: 480px;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--brown-dark);
      text-align: center;
    }
    h1 span { color: var(--orange); }

    .scoreboard {
      display: flex;
      gap: 24px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 12px 28px;
      font-weight: 700;
    }
    .score-item { text-align: center; }
    .score-item .val {
      font-size: 28px;
      color: var(--orange);
      font-family: 'Playfair Display', serif;
    }
    .score-item .lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--brown-mid);
    }

    /* ── CANVAS ── */
    #gameCanvas {
      border-radius: 20px;
      border: 2px solid var(--border);
      background: linear-gradient(180deg, #F5E6CC 0%, #EDD8B0 100%);
      touch-action: none;
      cursor: none;
      display: block;
      width: 100%;
      max-width: 448px;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(253,246,236,0.93);
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    .overlay.hidden { display: none; }
    .overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--brown-dark);
    }
    .overlay p { color: var(--brown-mid); font-size: 15px; text-align: center; max-width: 260px; line-height: 1.5; }
    .overlay .final-score { font-size: 52px; color: var(--orange); font-family: 'Playfair Display', serif; }

    .btn {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(232,114,42,0.25);
    }
    .btn:hover { background: #d4601a; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .canvas-container { position: relative; width: 100%; max-width: 448px; }

    .instructions {
      font-size: 13px;
      color: var(--brown-mid);
      text-align: center;
      line-height: 1.6;
    }

    /* lives display */
    .lives { font-size: 22px; letter-spacing: 4px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <span class="logo-icon">🛍️</span> Sreesathya Store
  </a>
  <a class="nav-back" href="index.html">← Back to Store</a>
</nav>

<div class="game-wrapper">
  <h1>Catch &amp; <span>Shop!</span></h1>

  <div class="scoreboard">
    <div class="score-item">
      <div class="val" id="scoreDisplay">0</div>
      <div class="lbl">Score</div>
    </div>
    <div class="score-item">
      <div class="val" id="levelDisplay">1</div>
      <div class="lbl">Level</div>
    </div>
    <div class="score-item">
      <div class="lives" id="livesDisplay">❤️❤️❤️</div>
      <div class="lbl">Lives</div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="448" height="520"></canvas>
    <div class="overlay" id="overlay">
      <div style="font-size:56px">🛍️</div>
      <h2>Catch &amp; Shop!</h2>
      <p>Move the basket to catch falling store items. Don't let them hit the ground!</p>
      <button class="btn" onclick="startGame()">Start Game</button>
    </div>
  </div>

  <p class="instructions">
    🖱️ Move mouse / 👆 Drag finger to move the basket<br>
    Catch products, avoid 💣 bombs!
  </p>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const W = canvas.width;
const H = canvas.height;

// ── GAME STATE ──
let score, lives, level, items, basket, animId, gameRunning, frameCount, spawnRate;

const ITEMS = ['🛒','🪴','📚','🎨','🧸','✏️','🎀','🧺','🪑','🖼️','🕯️','🎁'];
const BOMBS = ['💣'];
const BASKET_W = 90, BASKET_H = 28;

function initState() {
  score      = 0;
  lives      = 3;
  level      = 1;
  items      = [];
  frameCount = 0;
  spawnRate  = 90; // frames between spawns
  basket     = { x: W / 2, y: H - 50, w: BASKET_W, h: BASKET_H };
}

// ── INPUT ──
let pointerX = W / 2;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  pointerX = (e.clientX - rect.left) * scaleX;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  pointerX = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  pointerX = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: true });

// ── SPAWNING ──
function spawnItem() {
  const isBomb  = Math.random() < 0.15 + level * 0.01;
  const emoji   = isBomb ? '💣' : ITEMS[Math.floor(Math.random() * ITEMS.length)];
  const speed   = 2 + level * 0.5 + Math.random() * 1.5;
  const size    = 32 + Math.floor(Math.random() * 10);
  items.push({
    x:     size + Math.random() * (W - size * 2),
    y:     -size,
    vy:    speed,
    emoji, size, isBomb,
    spin:  (Math.random() - 0.5) * 0.06,
    angle: 0,
    trail: []
  });
}

// ── PARTICLES ──
let particles = [];
function burst(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color,
      r: 4 + Math.random() * 4
    });
  }
}

// ── FLOATING TEXTS ──
let floatTexts = [];
function floatText(x, y, text, color) {
  floatTexts.push({ x, y, text, color, life: 1, vy: -2 });
}

// ── DRAW ──
function drawBasket() {
  const bx = basket.x - basket.w / 2;
  const by = basket.y - basket.h / 2;

  // shadow
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#3B2A1A';
  ctx.beginPath();
  ctx.ellipse(basket.x, basket.y + basket.h/2 + 4, basket.w/2, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // basket body
  ctx.save();
  const grad = ctx.createLinearGradient(bx, by, bx, by + basket.h);
  grad.addColorStop(0, '#C49A6C');
  grad.addColorStop(1, '#8B5E2A');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(bx + 10, by);
  ctx.lineTo(bx + basket.w - 10, by);
  ctx.quadraticCurveTo(bx + basket.w, by, bx + basket.w, by + 10);
  ctx.lineTo(bx + basket.w + 4, by + basket.h);
  ctx.lineTo(bx - 4, by + basket.h);
  ctx.lineTo(bx, by + 10);
  ctx.quadraticCurveTo(bx, by, bx + 10, by);
  ctx.closePath();
  ctx.fill();

  // weave lines
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(bx + 2, by + (basket.h / 4) * (i + 0.5));
    ctx.lineTo(bx + basket.w - 2, by + (basket.h / 4) * (i + 0.5));
    ctx.stroke();
  }

  // rim highlight
  ctx.strokeStyle = '#E8B87A';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 4, by + 2);
  ctx.lineTo(bx + basket.w - 4, by + 2);
  ctx.stroke();
  ctx.restore();
}

function drawItem(item) {
  ctx.save();
  ctx.translate(item.x, item.y);
  ctx.rotate(item.angle);

  const r = item.size * 0.62;

  // white circle backdrop
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = item.isBomb ? '#FFE0DC' : '#FFFFFF';
  ctx.shadowColor = item.isBomb ? 'rgba(192,57,43,0.35)' : 'rgba(59,42,26,0.18)';
  ctx.shadowBlur = 10;
  ctx.fill();

  // coloured ring
  ctx.shadowBlur = 0;
  ctx.strokeStyle = item.isBomb ? '#E8722A' : '#C49A6C';
  ctx.lineWidth = 2;
  ctx.stroke();

  // emoji on top
  ctx.shadowColor = 'rgba(0,0,0,0.22)';
  ctx.shadowBlur = 4;
  ctx.font = `${item.size * 0.85}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(item.emoji, 0, 1);
  ctx.restore();
}

function drawBg() {
  // subtle dot grid
  ctx.fillStyle = 'rgba(196,154,108,0.06)';
  for (let x = 20; x < W; x += 30) {
    for (let y = 20; y < H; y += 30) {
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // ground line
  ctx.strokeStyle = 'rgba(196,154,108,0.25)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(0, H - 20);
  ctx.lineTo(W, H - 20);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── GAME LOOP ──
function loop() {
  if (!gameRunning) return;
  ctx.clearRect(0, 0, W, H);
  drawBg();

  frameCount++;

  // move basket
  basket.x += (pointerX - basket.x) * 0.18;
  basket.x = Math.max(basket.w/2, Math.min(W - basket.w/2, basket.x));

  // spawn
  if (frameCount % spawnRate === 0) spawnItem();

  // level up every 300 frames
  if (frameCount % 300 === 0) {
    level++;
    spawnRate = Math.max(40, spawnRate - 8);
    floatText(W/2, H/2, `Level ${level}! 🎉`, '#E8722A');
  }

  // update items
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += item.vy;
    item.angle += item.spin;

    // catch check
    const dx = Math.abs(item.x - basket.x);
    const dy = item.y - (basket.y - basket.h/2);
    if (dy > -item.size/2 && dy < basket.h + item.size/2 && dx < basket.w/2 + item.size/4) {
      items.splice(i, 1);
      if (item.isBomb) {
        lives--;
        burst(item.x, item.y, '#E8722A', 14);
        floatText(item.x, item.y - 20, '-1 ❤️', '#C0392B');
        canvas.style.animation = 'none';
        canvas.offsetHeight; // reflow
        canvas.style.animation = '';
        if (lives <= 0) { endGame(); return; }
      } else {
        const pts = Math.ceil(item.vy * 2);
        score += pts;
        burst(item.x, item.y, '#4A7C59', 10);
        floatText(item.x, item.y - 20, `+${pts}`, '#4A7C59');
      }
      updateHUD();
      continue;
    }

    // missed
    if (item.y > H + item.size) {
      items.splice(i, 1);
      if (!item.isBomb) {
        lives--;
        burst(item.x, H - 20, '#C0392B', 8);
        floatText(item.x, H - 40, 'Missed! 💔', '#C0392B');
        updateHUD();
        if (lives <= 0) { endGame(); return; }
      }
    }

    drawItem(item);
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.04;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // float texts
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.y += f.vy; f.life -= 0.025;
    if (f.life <= 0) { floatTexts.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.color;
    ctx.font = 'bold 18px Lato, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }

  drawBasket();
  animId = requestAnimationFrame(loop);
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('livesDisplay').textContent =
    '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

function startGame() {
  overlay.classList.add('hidden');
  initState();
  updateHUD();
  gameRunning = true;
  particles = []; floatTexts = [];
  cancelAnimationFrame(animId);
  loop();
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  overlay.classList.remove('hidden');
  const medal = score >= 100 ? '🥇' : score >= 50 ? '🥈' : '🥉';
  overlay.innerHTML = `
    <div style="font-size:56px">${medal}</div>
    <h2>Game Over!</h2>
    <div class="final-score">${score}</div>
    <p>You reached <strong>Level ${level}</strong>. 
       ${score >= 100 ? 'Amazing shopper! 🎉' : score >= 50 ? 'Great catch! 👏' : 'Keep practising! 💪'}</p>
    <button class="btn" onclick="startGame()">Play Again</button>
    <a href="index.html" style="color:var(--brown-mid);font-size:14px;margin-top:4px;">← Back to Store</a>
  `;
}

// Initial canvas draw
ctx.clearRect(0, 0, W, H);
drawBg();
</script>
</body>
</html>
